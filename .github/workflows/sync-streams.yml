---
name: Sync image streams

on:
  workflow_run:
    workflows: ["Build container image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      source:
        description: "Source branch"
        required: true
        type: choice
        options:
          - main
          - dx
      target:
        description: "Target branch"
        required: true
        type: choice
        options:
          - dx
          - testing
          - beta

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || inputs.source }}-${{ inputs.target || github.run_id }}
  cancel-in-progress: false

jobs:
  check-scheduled-main-build:
    name: Check scheduled main build
    if: ${{ github.event.workflow_run.event == 'schedule' && github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04
    outputs:
      main_success: ${{ steps.check.outputs.main_success }}
    steps:
      - name: Check main matrix job result
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          conclusion=$(
            gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
              --jq '.jobs[] | select(.name == "Build and push image (main)") | .conclusion'
          )

          if [[ "${conclusion}" == "success" ]]; then
            echo "main_success=true" >> "${GITHUB_OUTPUT}"
          else
            echo "main_success=false" >> "${GITHUB_OUTPUT}"
          fi

  sync-main-to-dx:
    name: Sync main to dx
    needs: check-scheduled-main-build
    if: ${{ github.event_name == 'workflow_run' && always() && github.event.workflow_run.head_branch == 'main' && ((github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success') || (github.event.workflow_run.event == 'schedule' && needs.check-scheduled-main-build.outputs.main_success == 'true')) }}
    uses: ./.github/workflows/sync-one-stream.yml
    with:
      source: "main"
      target: "dx"

  sync-main-to-beta:
    name: Sync main to beta
    needs: check-scheduled-main-build
    if: ${{ github.event_name == 'workflow_run' && always() && github.event.workflow_run.head_branch == 'main' && ((github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success') || (github.event.workflow_run.event == 'schedule' && needs.check-scheduled-main-build.outputs.main_success == 'true')) }}
    uses: ./.github/workflows/sync-one-stream.yml
    with:
      source: "main"
      target: "beta"

  manual-sync:
    name: Manual sync
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/sync-one-stream.yml
    with:
      source: ${{ inputs.source }}
      target: ${{ inputs.target }}
