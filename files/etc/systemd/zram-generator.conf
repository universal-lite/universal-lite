[zram0]
# 125% of physical RAM, capped at 16 GB. The multiplier gives a bit of
# compressed-swap headroom beyond physical RAM without bloating zsmalloc
# metadata. The 16 GB cap is a sanity bound against very-high-RAM hosts
# — zram-size is a ceiling, not an upfront allocation, so raising it
# doesn't consume RAM unless pages actually get swapped.
zram-size = min(ram * 5 / 4, 16384)
compression-algorithm = zstd(level=3)
swap-priority = 100
