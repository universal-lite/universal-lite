# Universal-Lite default lid-close behaviour.
#
# This file is the compile-time default. The Settings -> Power & Lock
# page rewrites it via pkexec /usr/libexec/universal-lite-lid-action
# whenever the user picks a different action. Shipping a default with
# the expected HandleLidSwitch=suspend line prevents apply-settings'
# _sync_lid_action check from triggering a pkexec prompt on every
# single settings mutation on a fresh install (font size, theme,
# accent, etc.), since the check is "is 'HandleLidSwitch=<target>' in
# this file? if not, invoke pkexec".
#
# Must stay byte-identical to what universal-lite-lid-action writes
# for the "suspend" action. Mismatched content would re-trigger the
# pkexec storm this file is meant to prevent.
[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=ignore
