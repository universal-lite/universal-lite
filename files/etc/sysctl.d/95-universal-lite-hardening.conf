# Universal-Lite hardening sysctls.
#
# Base image (ublue-os/base-main -> fedora-bootc) inherits Fedora defaults
# which already set fs.protected_*, rp_filter=2, accept_source_route=0, and
# tcp_syncookies=1. Bluefin ships no additional hardening sysctls, so these
# are net-new on top of the Fedora baseline. Kept conservative because this
# is a single-user Chromebook: no SSH, no routing, nftables firewall, labwc.
#
# Omitted deliberately:
#   kernel.unprivileged_bpf_disabled - breaks some Flatpak/eBPF tooling.
#   kernel.kexec_load_disabled       - can block firmware update flows.
#   kernel.perf_event_paranoid=3     - breaks perf/profiling tools.
#   kernel.yama.ptrace_scope=1       - breaks GDB attach to sibling process.

# Hide kernel pointers from unprivileged users (anti-KASLR-leak).
kernel.kptr_restrict = 2

# Restrict dmesg to root; prevents leaking kernel addresses and boot info.
kernel.dmesg_restrict = 1

# This host does not route; drop ICMP redirects on all interfaces.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Belt-and-suspenders: Fedora default already sets these, but re-assert so
# a future base-image drop can't silently regress us.
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
