# Writeback tuning for slow eMMC.
#
# Kernel defaults (dirty_background_ratio=10, dirty_ratio=20) let ~200 MB
# of dirty pages accumulate on a 2 GB box before writeback starts. When
# the flush finally kicks in it saturates the eMMC queue and stalls every
# subsequent interactive I/O — visible as "the cursor freezes for a few
# seconds after saving a file". Lower values flush earlier and more
# often, trading total throughput for smooth interactivity.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
vm.dirty_expire_centisecs = 1500
vm.dirty_writeback_centisecs = 500
