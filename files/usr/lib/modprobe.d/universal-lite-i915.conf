# Universal-Lite i915 tuning for low-power Intel iGPUs
# (Bay Trail, Cherry Trail, Haswell, Broadwell, Skylake-era Chromebooks).
#
#   fastboot=1    Skip the mode re-set at boot when the firmware handoff
#                 already has the display in a usable state. Saves a full
#                 mode-set (visible black flash) on cold boot.
#   enable_fbc=1  Framebuffer compression — saves memory bandwidth on the
#                 display path, which matters on chipsets with only
#                 dual-channel DDR3 sharing between CPU and iGPU.
#   enable_psr=1  Panel self-refresh — the display keeps showing the last
#                 committed frame without waking the GPU when nothing is
#                 moving. Several watts of idle power on a typical laptop.
#
# Known rough edge: PSR occasionally flickers on the first few frames
# after wake on a handful of panels. Users who hit this can drop a file
# in /etc/modprobe.d/ to override.
options i915 fastboot=1 enable_fbc=1 enable_psr=1
