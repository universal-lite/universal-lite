# Transparent hugepage policy: only give hugepages to apps that explicitly
# ask via madvise() (Chrome, Firefox, JVMs). Kernel default "always" does
# aggressive huge-page allocation plus periodic compaction, which causes
# visible stalls on slow CPUs. "madvise" gives the same benefit to apps
# that want it without the background cost for apps that don't.
w /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise
w /sys/kernel/mm/transparent_hugepage/defrag - - - - madvise
