# Trim login gettys to one. greetd lives on vt 7, vt 1 stays available as
# a recovery console. Saves ~50 MB RAM on 2 GB hardware (each dormant
# getty holds ~10 MB plus its agetty process) and shaves a bit of boot
# time. Users can override in /etc/systemd/logind.conf.d/.
[Login]
NAutoVTs=1
ReserveVT=1
