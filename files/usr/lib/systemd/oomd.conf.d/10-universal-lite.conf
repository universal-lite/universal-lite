# systemd-oomd tuning for 2 GB hardware.
#
# Fire earlier than Fedora's upstream defaults (swap 90%, pressure 60%/30s)
# because by the time those trip on 2 GB zram-only systems the UI can already
# be locked up. Keep the thresholds conservative enough to avoid killing
# recoverable browser bursts; the explicit ManagedOOM drop-ins make sure these
# limits are actually enforced while still leaving most zram capacity available.
[OOM]
SwapUsedLimit=80%
DefaultMemoryPressureLimit=50%
DefaultMemoryPressureDurationSec=20s
