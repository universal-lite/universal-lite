# systemd-oomd tuning for 2 GB hardware.
#
# Fire earlier than Fedora's upstream defaults (swap 90%, pressure 60%/30s)
# because by the time those trip on 2 GB the UI is already locked up. At
# swap 75% / memory-pressure 50% sustained 20 s we still kill before the
# kernel OOM killer engages, but late enough to not evict apps the user is
# actively using.
[OOM]
SwapUsedLimit=75%
DefaultMemoryPressureLimit=50%
DefaultMemoryPressureDurationSec=20s
