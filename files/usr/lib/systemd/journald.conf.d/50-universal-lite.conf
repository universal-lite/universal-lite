# Journal size caps for 16 GB eMMC targets. Default is uncapped, which on
# a multi-month-old install quietly eats ~1 GB of the user's disk. Users
# in /etc/systemd/journald.conf.d/ can override.
[Journal]
SystemMaxUse=100M
SystemKeepFree=200M
SystemMaxFileSize=10M
RuntimeMaxUse=50M
MaxRetentionSec=1month
Compress=yes
